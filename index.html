<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow - Quản lý tài chính</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- Login Screen -->
    <div id="login-screen" style="position: fixed; inset: 0; background-color: var(--bg-main); display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div class="card" style="text-align: center; max-width: 400px; padding: 48px 32px; box-shadow: var(--shadow-lg);">
            <i class="ph-fill ph-wallet text-positive" style="font-size: 64px; margin-bottom: 24px;"></i>
            <h2 style="font-size: 24px; margin-bottom: 8px;">FinanceFlow</h2>
            <p class="text-muted" style="margin-bottom: 32px;">Đăng nhập để mỗi cá nhân được quản lý ví bộ lưu trữ tài chính hoàn toàn biệt lập của riêng mình.</p>
            <button class="btn btn-primary btn-full" onclick="Store.loginWithGoogle()" style="font-size: 16px; padding: 12px; gap: 12px;">
                <i class="ph ph-google-logo" style="font-size: 20px;"></i> Đăng nhập bằng Google
            </button>
        </div>
    </div>

    <!-- Main App UI -->
    <div class="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ph-fill ph-wallet"></i>
                    <span>FinanceFlow</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tab="dashboard">
                    <i class="ph ph-squares-four"></i>
                    <span>Tổng quan</span>
                </a>
                <a href="#" class="nav-item" data-tab="transactions">
                    <i class="ph ph-arrows-left-right"></i>
                    <span>Giao dịch</span>
                </a>
                <a href="#" class="nav-item" data-tab="accounts">
                    <i class="ph ph-bank"></i>
                    <span>Tài khoản</span>
                </a>
                <a href="#" class="nav-item" data-tab="debts">
                    <i class="ph ph-handshake"></i>
                    <span>Vay & Nợ</span>
                </a>
                <a href="#" class="nav-item" data-tab="reports">
                    <i class="ph ph-chart-pie-slice"></i>
                    <span>Báo cáo</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-primary btn-full" id="btn-add-transaction-sidebar" onclick="App.openTransactionModal()">
                    <i class="ph ph-plus"></i> Thêm giao dịch
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="page-title">
                    <h1 id="current-page-title">Tổng quan</h1>
                </div>
                <div class="topbar-actions">
                    <div class="user-profile" style="display: flex; align-items: center; gap: 16px;">
                        <span id="user-name" style="font-weight: 500; font-size: 14px;"></span>
                        <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=10b981&color=fff" alt="User">
                        <button class="btn btn-outline btn-sm" onclick="Store.logout()" style="gap: 4px;"><i class="ph ph-sign-out"></i> Thoát</button>
                    </div>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Dynamic content injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="transaction-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Thêm giao dịch mới</h2>
                <button class="btn-close" onclick="App.closeTransactionModal()"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="transaction-form" onsubmit="App.handleTransactionSubmit(event)">
                    <div class="form-group type-selector">
                        <label class="radio-card">
                            <input type="radio" name="trans_type" value="income" checked>
                            <div class="card-content income">
                                <i class="ph ph-trend-up"></i> Thu nhập
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="trans_type" value="expense">
                            <div class="card-content expense">
                                <i class="ph ph-trend-down"></i> Chi tiêu
                            </div>
                        </label>
                    </div>
                    
                    <div class="form-group mt-4">
                        <label>Số tiền (VNĐ) <span class="text-danger">*</span></label>
                        <input type="text" inputmode="numeric" id="trans-amount" class="form-control" placeholder="0" required oninput="Utils.formatInputNumber(this)">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Tài khoản <span class="text-danger">*</span></label>
                            <select id="trans-account" class="form-control" required>
                                <!-- Injected via JS -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Danh mục <span class="text-danger">*</span></label>
                            <select id="trans-category" class="form-control" required>
                                <option value="Lương">Lương</option>
                                <option value="Ăn uống">Ăn uống</option>
                                <option value="Di chuyển">Di chuyển</option>
                                <option value="Mua sắm">Mua sắm</option>
                                <option value="Hóa đơn">Hóa đơn</option>
                                <option value="Giải trí">Giải trí</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Ngày <span class="text-danger">*</span></label>
                            <input type="date" id="trans-date" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Ghi chú</label>
                        <input type="text" id="trans-note" class="form-control" placeholder="Tùy chọn">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full mt-4">Lưu giao dịch</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Undo Button -->
    <button id="btn-undo" class="btn btn-outline" style="position: fixed; bottom: 24px; right: 24px; background: var(--bg-card); display: none; z-index: 100; box-shadow: var(--shadow-lg); font-size: 14px; padding: 12px 20px; border-radius: 99px;">
        <i class="ph ph-arrow-u-up-left" style="font-size: 18px;"></i> Hoàn tác
    </button>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics-compat.js"></script>
    <!-- Add Auth script -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
